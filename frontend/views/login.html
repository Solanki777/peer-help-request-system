<!-- ng-controller is already set in routing, so no need here -->
<div class="auth-container">
  <div class="auth-card">
    <div class="card">
      <div class="card-header text-center py-4">
        <h2>🎓 PeerHelp GTU</h2>
        <p class="mb-0 opacity-75">Login to your account</p>
      </div>
      <div class="card-body p-4">

        <!-- Alert message (shows only when message is not empty) -->
        <div class="alert alert-info" ng-show="message">{{message}}</div>

        <!--
          ng-submit="login()" → Call login() when form submitted
          name="loginForm"    → Give form a name for validation
          novalidate          → Let AngularJS handle validation
        -->
        <form name="loginForm" ng-submit="login()" novalidate>

          <div class="mb-3">
            <label class="form-label fw-semibold">📧 Email</label>
            <!--
              ng-model="user.email" → TWO-WAY BINDING
              When user types, $scope.user.email updates automatically!
            -->
            <input type="email" class="form-control"
                   ng-model="user.email"
                   placeholder="your@email.com"
                   required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">🔒 Password</label>
            <input type="password" class="form-control"
                   ng-model="user.password"
                   placeholder="Your password"
                   required>
          </div>

          <!-- ng-disabled: button disabled while loading -->
          <button type="submit" class="btn btn-primary w-100 py-2" ng-disabled="loading">
            <!-- Conditional text using ng-show -->
            <span ng-show="!loading">Login →</span>
            <span ng-show="loading">Logging in...</span>
          </button>
        </form>

        <hr>
        <div class="text-center">
          <small>Don't have an account? </small>
          <!-- AngularJS routing link -->
          <a href="#!/register" class="fw-semibold">Register here</a>
        </div>
      </div>
    </div>
  </div>
</div>

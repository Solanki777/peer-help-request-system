<!DOCTYPE html>
<html ng-app="peerHelpApp">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PeerHelp GTU</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-route.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
</head>
<!-- FIX: dark-mode class is toggled on <body> by JS — ng-class on <html> is outside Angular scope -->

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-dark" ng-controller="NavCtrl">
    <div class="container-fluid px-4">
      <a class="navbar-brand fw-bold" href="#!/dashboard">🎓 PeerHelp GTU</a>

      <div class="d-flex align-items-center gap-3" ng-show="isLoggedIn()">

        <!-- 🔔 NOTIFICATION BELL -->
        <div class="position-relative" ng-click="toggleNotifications()" style="cursor:pointer">
          <span style="font-size:1.4rem">🔔</span>
          <span class="badge bg-danger position-absolute top-0 start-100 translate-middle" ng-show="unreadCount > 0"
            style="font-size:0.65rem">{{unreadCount}}</span>
        </div>

        <!-- Notification dropdown -->
        <div class="notification-panel" ng-show="showNotifications">
          <div class="d-flex justify-content-between align-items-center p-2 border-bottom">
            <strong>Notifications</strong>
            <button class="btn btn-sm btn-outline-secondary" ng-click="markAllRead()">Mark all read</button>
          </div>
          <div ng-repeat="n in notifications" class="notif-item" ng-class="{'unread': !n.isRead}">
            <a href="{{n.link}}">{{n.message}}</a>
            <small class="text-muted d-block">{{n.createdAt | date:'short'}}</small>
          </div>
          <div ng-show="notifications.length === 0" class="p-3 text-muted text-center">
            No notifications yet
          </div>
        </div>

        <!-- 🌙 DARK MODE TOGGLE -->
        <button class="btn btn-sm btn-outline-light" ng-click="toggleDark()">
          <span ng-show="!isDarkMode">🌙 Dark</span>
          <span ng-show="isDarkMode">☀️ Light</span>
        </button>

        <span class="text-white">👋 {{getUser().name}}</span>
        <span class="badge bg-danger" ng-show="getUser().role === 'admin'">ADMIN</span>
        <a href="#!/suggestions" class="btn btn-sm btn-outline-light">💡 Suggestions</a>
        <a href="#!/admin" class="btn btn-sm btn-danger" ng-show="getUser().role === 'admin'">🛡️ Admin</a>
        <a href="#!/profile" class="btn btn-sm btn-outline-light" ng-show="getUser().role !== 'admin'">👤 Profile</a>
        <button class="btn btn-sm btn-outline-light" ng-click="logout()">Logout</button>
      </div>
    </div>
  </nav>

  <!-- PAGE CONTENT (SPA) -->
  <div ng-view class="main-content"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>

</html>
